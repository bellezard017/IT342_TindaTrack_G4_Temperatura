spring.datasource.url=REPLACE_WITH_YOUR_DATABASE_URL
spring.datasource.username=REPLACE_WITH_YOUR_DATABASE_USERNAME
spring.datasource.password=REPLACE_WITH_YOUR_DATABASE_PASSWORD

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

jwt.secret=REPLACE_WITH_A_STRONG_SECRET_KEY
jwt.expiration=REPLACE_WITH_EXPIRATION_TIME_IN_MILLISECONDS

# Google OAuth — must match @Value annotations in GoogleOAuthService
google.oauth.client-id=REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID
google.oauth.client-secret=REPLACE_WITH_YOUR_GOOGLE_CLIENT_SECRET
google.oauth.redirect-uri=REPLACE_WITH_YOUR_GOOGLE_REDIRECT_URI